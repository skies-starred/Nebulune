name: Build and Notify
on:
  push:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew buildAndCollect --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: build-artifacts
          path: build/libs/

      - name: Zip and upload to builds.aerii.xyz
        env:
          UPLOAD_KEY: ${{ secrets.UPLOAD_KEY }}
        run: |
          cd build/libs && zip -r ../../build-output.zip . && cd ../..
          curl -X POST https://builds.aerii.xyz/upload \
            -H "Authorization: $UPLOAD_KEY" \
            -F "file=@build-output.zip" \
            -F "commit=${{ github.sha }}" \
            -F "branch=${{ github.ref_name }}"

      - name: Notify Discord
        env:
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          curl -X POST "https://builds.aerii.xyz/notify?type=build" \
            -H "Content-Type: application/json" \
            -H "Authorization: $NOTIFY_TOKEN" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"run_id\": \"${{ github.run_id }}\",
              \"before\": \"${{ github.event.before }}\",
              \"after\": \"${{ github.event.after }}\"
            }"
